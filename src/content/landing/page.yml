benefits:
  items:
    - icon: "/img/icon-joints.svg"
      title: "Питание суставов"
      text: "Полноценный рацион для ваших суставов. Ежедневно снабжаем хрящевую ткань важными витаминами и микроэлементами, необходимыми для поддержания ее структуры и функций."
    - icon: "/img/icon-bone.svg"
      title: "Регенерация"
      text: "Запуск собственных механизмов организма по восстановлению хряща, а не просто временное маскирование проблемы. Стимулируем внутренние ресурсы организма для восстановления хрящевой ткани, способствуя ее здоровью изнутри."
    - icon: "/img/icon-run.svg"
      title: "Результат"
      text: "Сохраняем комфорт в любом движении. Благодаря комплексной поддержке вы дольше остаетесь активными, забываете о скованности и с легкостью занимаетесь любимыми делами."
    - icon: "/img/icon-molecule.svg"
      title: "Особенный состав"
      text: "Витамины и микроэлементы, традиционно используемые для поддержки хрящевой ткани и суставов. Являются их элементами и участвуют в их метаболизме. Представлено в эффективной дозировке."
    - icon: "/img/icon-science.svg"
      title: "Комплексный эффект"
      text: "Мы объединили нутритивную защиту и стимуляцию регенерации хряща. Это комплексный подход к здоровью суставов: питание + обновление = ваша уверенная подвижность и комфорт при любом уровне активности."

composition:
  titleLead: "«Complex SW СУСТАВЫ» — комплекс "
  titleAccent: "из 9 активных компонентов"
  image: "/img/scoop.webp"
  cta:
    label: "Купить в 1 клик"
    href: "#order"
  rows:
    - name: "Глюкозамин"
      role: "Хондропротектор, который восстанавливает хрящевую ткань, уменьшает боль и воспаление в суставах, а также улучшает их подвижность"
    - name: "Хондроитин"
      role: "Является структурным компонентом хряща, который защищает его от разрушения, улучшает минеральный обмен и стимулирует выработку суставной жидкости."
    - name: "МСМ"
      role: "Метилсульфонилметан укрепляет суставы, снимает воспаление и боль, улучшает кожу, волосы, ногти и нормализует иммунитет"
    - name: "Коллаген"
      role: "Является основным фибриллярным белком соединительной ткани, обеспечивающим прочность и эластичность сухожилий, костей и хрящей"
    - name: "Босвелия"
      role: "Подавляет воспаление в суставах, блокируя синтез лейкотриенов, что уменьшает боль и защищает хрящ от разрушения без вреда для ЖКТ"
    - name: "Витамин С"
      role: "Участвует в синтезе коллагена, метаболизме гормонов и тирозина, окислительно-восстановительных процессах и улучшает усвоение железа в кишечнике"
    - name: "Витамин Е"
      role: "Защищает суставы, замедляя разрушение хряща и уменьшая боль и скованность"
    - name: "Марганец"
      role: "Необходим для работы центральной нервной системы, крепости костей и жирового обмена"
    - name: "Селен"
      role: "Замедляет старение как антиоксидант и сохраняет эластичность тканей"

