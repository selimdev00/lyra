faq:
  title: "Часто задаваемые вопросы"
  items:
    - q: "Можно ли «Complex SW СУСТАВЫ» принимать с другими препаратами"
      a: "Да, комплекс совместим с большинством витаминно-минеральных средств и хондропротекторов. При одновременном приёме рецептурных лекарств — гормональных, антибиотиков, антикоагулянтов — рекомендуем согласовать схему с врачом."
    - q: "Какие противопоказания?"
      a: "Противопоказанием является индивидуальная непереносимость компонентов препарата."
    - q: "Почему в форме порошка, а не капсул?"
      a: "Порошковая форма даёт более высокую дозировку активных компонентов на порцию (1 мерная ложка = 17 обычных капсул) и лучше усваивается за счёт растворения в воде. Также не нужно глотать большое число капсул каждый день."
    - q: "Какие показания для приема комплекса"
      a: "Поддержка опорно-двигательного аппарата при активных нагрузках, профилактика возрастных изменений суставов, восстановление после травм и операций, дискомфорт и скованность движений, профилактика остеоартроза."

