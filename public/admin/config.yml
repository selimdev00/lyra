backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://lyra.pages.dev
display_url: https://lyra.pages.dev
logo_url: /favicon.svg

collections:
  - name: landing
    label: "Лендинг"
    label_singular: "Раздел"
    folder: src/content/landing
    create: false
    delete: false
    extension: yml
    format: yml
    slug: "{{slug}}"
    fields:
      - label: "SEO"
        name: seo
        widget: object
        fields:
          - { label: "Title", name: title, widget: string }
          - { label: "Description", name: description, widget: text }
          - { label: "OG-картинка", name: ogImage, widget: image, required: false }

      - label: "Шапка"
        name: header
        widget: object
        fields:
          - { label: "Логотип", name: logo, widget: image }
          - { label: "Подпись бренда", name: brandLabel, widget: string }
          - label: "Навигация"
            name: nav
            widget: list
            fields:
              - { label: "Текст", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }
          - label: "CTA"
            name: cta
            widget: object
            fields:
              - { label: "Текст", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }

      - label: "Hero"
        name: hero
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Подзаголовок", name: subtitle, widget: text }
          - label: "CTA"
            name: cta
            widget: object
            fields:
              - { label: "Текст", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }
          - label: "Продукт"
            name: product
            widget: object
            fields:
              - { label: "Картинка", name: image, widget: image }
              - { label: "Alt", name: alt, widget: string }
          - label: "Мета"
            name: meta
            widget: object
            fields:
              - { label: "Вес", name: weight, widget: string }
              - { label: "Курс", name: course, widget: string }
          - label: "Подпись внизу"
            name: kicker
            widget: object
            fields:
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: body, widget: text }

      - label: "Intro"
        name: intro
        widget: object
        fields:
          - { label: "Заголовок секции", name: sectionTitle, widget: text }
          - label: "Карточка"
            name: card
            widget: object
            fields:
              - { label: "Картинка", name: image, widget: image }
              - { label: "Alt", name: imageAlt, widget: string }
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: body, widget: text }
              - label: "CTA"
                name: cta
                widget: object
                fields:
                  - { label: "Текст", name: label, widget: string }
                  - { label: "Ссылка", name: href, widget: string }
          - label: "Follow-up блок"
            name: followUp
            widget: object
            fields:
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: body, widget: text }
          - label: "Нижний блок"
            name: bottomBlock
            widget: object
            fields:
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: body, widget: text }
              - label: "CTA"
                name: cta
                widget: object
                fields:
                  - { label: "Текст", name: label, widget: string }
                  - { label: "Ссылка", name: href, widget: string }

      - label: "Преимущества"
        name: benefits
        widget: object
        fields:
          - label: "Карточки"
            name: items
            widget: list
            fields:
              - { label: "Иконка", name: icon, widget: image }
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: text, widget: text }

      - label: "Состав"
        name: composition
        widget: object
        fields:
          - { label: "Заголовок (начало)", name: titleLead, widget: string }
          - { label: "Заголовок (акцент)", name: titleAccent, widget: string }
          - { label: "Картинка", name: image, widget: image }
          - label: "CTA"
            name: cta
            widget: object
            fields:
              - { label: "Текст", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }
          - label: "Компоненты"
            name: rows
            widget: list
            fields:
              - { label: "Название", name: name, widget: string }
              - { label: "Назначение", name: role, widget: string }

      - label: "Кому подходит"
        name: audience
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: text }
          - { label: "Фон", name: image, widget: image }
          - label: "Карточки"
            name: cards
            widget: list
            fields:
              - { label: "Возраст", name: age, widget: string }
              - { label: "Текст", name: text, widget: text }
          - { label: "Активная карточка (индекс)", name: activeIndex, widget: number, required: false, default: 1 }

      - label: "Сравнение"
        name: comparison
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - label: "Параграфы описания"
            name: description
            widget: list
            field: { label: "Параграф", name: paragraph, widget: text }
          - { label: "Картинка банки", name: banka, widget: image }
          - label: "Курс"
            name: course
            widget: object
            fields:
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: body, widget: text }
              - label: "CTA"
                name: cta
                widget: object
                fields:
                  - { label: "Текст", name: label, widget: string }
                  - { label: "Ссылка", name: href, widget: string }
          - label: "Порция"
            name: portion
            widget: object
            fields:
              - { label: "Заголовок", name: title, widget: string }
              - { label: "Текст", name: body, widget: text }

      - label: "Покупка"
        name: purchase
        widget: object
        fields:
          - { label: "Заголовок продукта", name: productTitle, widget: string }
          - { label: "Цена", name: price, widget: string }
          - { label: "Подпись", name: meta, widget: string }
          - label: "CTA"
            name: cta
            widget: object
            fields:
              - { label: "Текст", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }
          - { label: "Заголовок «Применение»", name: usageTitle, widget: string }
          - { label: "Картинка применения", name: usageImage, widget: image }
          - label: "Шаги применения"
            name: usageSteps
            widget: list
            field: { label: "Шаг", name: step, widget: string }

      - label: "FAQ"
        name: faq
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - label: "Вопросы"
            name: items
            widget: list
            fields:
              - { label: "Вопрос", name: q, widget: string }
              - { label: "Ответ", name: a, widget: text, required: false }

      - label: "Контакты"
        name: contacts
        widget: object
        fields:
          - { label: "Заголовок", name: title, widget: string }
          - { label: "Email", name: email, widget: string }
          - label: "Мессенджеры"
            name: messengers
            widget: list
            fields:
              - { label: "Название", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }
              - { label: "Иконка", name: icon, widget: image }
          - { label: "Текст согласия", name: consentText, widget: text }
          - { label: "Текст кнопки", name: submitLabel, widget: string }

      - label: "Подвал"
        name: footer
        widget: object
        fields:
          - { label: "Логотип", name: logo, widget: image }
          - { label: "Копирайт", name: copyright, widget: string }
          - { label: "Права", name: rights, widget: string }
          - { label: "Дисклеймер", name: disclaimer, widget: text }
          - label: "Ссылки"
            name: links
            widget: list
            fields:
              - { label: "Текст", name: label, widget: string }
              - { label: "Ссылка", name: href, widget: string }
